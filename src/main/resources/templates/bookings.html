<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Bookings - EcoLoop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header">
    <h1>All bookings</h1>
    <p>A simple overview of every booking recorded in the system.</p>
</section>

<section class="section">
    <div th:if="${#lists.isEmpty(bookings)}" class="empty">
        <p>There are no bookings yet.</p>
    </div>

    <table class="table" th:if="${!#lists.isEmpty(bookings)}">
        <thead>
        <tr>
            <th>#</th>
            <th>Tool</th>
            <th>User</th>
            <th>Start</th>
            <th>End</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="b : ${bookings}">
            <td th:text="${b.id}">1</td>
            <td>
                <a th:href="@{'/tools/' + ${b.toolId}}" th:text="${b.toolName}">Tool</a>
            </td>
            <td th:text="${b.userName}">User</td>
            <td th:text="${b.startDate}">start</td>
            <td th:text="${b.endDate}">end</td>
            <td>
                <span class="status-badge"
                      th:classappend="${'status-' + #strings.toLowerCase(b.status)}"
                      th:text="${b.status}">STATUS</span>
            </td>
        </tr>
        </tbody>
    </table>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
